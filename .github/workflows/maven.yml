name: Java CI with Maven

# 1. Kích hoạt (trigger) khi có sự kiện push hoặc pull_request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên máy chủ ảo Linux của GitHub

    steps:
      - name: Checkout mã nguồn từ GitHub về máy chủ ảo
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Khớp với cấu hình pom.xml của bạn
          distribution: 'temurin'
          cache: maven

      # 2. Thực thi vòng đời build của Maven (chạy test và package)
      - name: Build dự án với Maven
        run: mvn clean test package

      # 3. Triển khai action upload-artifact để giữ lại file .jar
      - name: Lưu trữ file .jar đã được đóng gói
        uses: actions/upload-artifact@v4
        with:
          name: JavaExercises-Artifact # Tên của file zip sẽ tải về
          path: target/*.jar # Tìm và lưu toàn bộ file .jar trong thư mục target